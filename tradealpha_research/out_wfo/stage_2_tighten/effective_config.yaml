run:
  symbol: XAUUSDr
  timeframe: H1
  utc: true
  start: '2021-01-01'
  end: '2025-12-31'
costs:
  spread_points_model: fixed
  fixed_spread_points: 220
  slippage_points: 25
  commission_per_lot: 7.0
execution:
  trade_on_closed_bar: true
  min_trade_gap_sec: 60
risk:
  initial_balance: 10000
constraints:
  max_dd_pct: 15.0
  min_trades: 160
  min_pf: 1.15
  worst_month_pct: -10.0
search_space:
  InpMAfast:
    type: int
    low: 20
    high: 31
  InpMAslow:
    type: int
    low: 80
    high: 109
  InpRSI_Period:
    type: int
    low: 8
    high: 12
  InpRSI_BuyMax:
    type: int
    low: 58
    high: 65
  InpRSI_SellMin:
    type: int
    low: 44
    high: 55
  InpATR_Period:
    type: int
    low: 18
    high: 28
  InpATR_SL_Mult:
    type: float
    low: 1.5
    high: 1.6
    step: 0.1
  InpRR:
    type: float
    low: 3.0
    high: 3.2
    step: 0.1
  InpMaxSpreadPts:
    type: int
    low: 300
    high: 350
    step: 10
  InpRiskPct:
    type: float
    low: 0.35000000000000003
    high: 0.6000000000000001
    step: 0.05
  MaxTradesPerDay:
    type: int
    low: 8
    high: 10
  DailyLossPct:
    type: float
    low: 2.75
    high: 3.5
    step: 0.25
  UseTrailingStop:
    type: bool
  TS_StartPts:
    type: int
    low: 525
    high: 600
    step: 25
  TS_StepPts:
    type: int
    low: 50
    high: 70
    step: 10
  UseBreakEven:
    type: bool
  BE_TriggerPts:
    type: int
    low: 150
    high: 230
    step: 10
  BE_OffsetPts:
    type: int
    low: 0
    high: 5
    step: 5
  MinTradeGapSec:
    type: int
    low: 180
    high: 360
    step: 30
rules:
- InpMAslow >= InpMAfast + 10
- InpRSI_SellMin <= InpRSI_BuyMax - 5
- TS_StepPts <= TS_StartPts
